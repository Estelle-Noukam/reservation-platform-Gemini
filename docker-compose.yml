version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: booking_db
    restart: always
    environment:
      POSTGRES_USER: booking_user
      POSTGRES_PASSWORD: booking_password
      POSTGRES_DB: booking_system
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: booking_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DB_HOST=db
      - DB_USER=booking_user
      - DB_PASSWORD=booking_password
      - DB_NAME=booking_system
      - DB_PORT=5432
      - JWT_SECRET=super_secret_key_12345
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: booking_frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
